# Builds this repository (Seneca II panel) and deploys to GitHub Pages for https://senecaii.openattitude.org/
#
# Repo: Settings → Pages → Source: GitHub Actions
# Repo: Settings → Pages → Custom domain: senecaii.openattitude.org (DNS + HTTPS as prompted)
#
# Served at the site root, so Vite base is "/" (not /repo-name/).

name: Deploy Seneca II panel to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Custom host at zone apex (see public/CNAME); assets load from /
          BASE_URL: /
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://senecaii.openattitude.org
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
